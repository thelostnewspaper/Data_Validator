name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  test-and-package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Python Environment setup & testing
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-level: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov ruff sqlglot

    - name: Lint Python Code
      run: ruff check engine/

    - name: Run Engine Tests
      run: python -m pytest engine/tests/ -v

    # 2. Node.js Environment setup, compilation, & linting
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install

    - name: Compile and Bundle Extension
      run: npm run compile

    - name: Run ESLint
      run: npm run lint

    # 3. Packaging
    - name: Package Extension (.vsix)
      run: npx vsce package --no-dependencies

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-validator-vsix
        path: "*.vsix"

  publish:
    needs: test-and-package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: ai-validator-vsix
        path: .

    - name: Publish to VS Code Marketplace
      run: npx vsce publish --packagePath $(ls *.vsix)
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}

    - name: Publish to Open VSX Registry
      run: npx ovsx publish --packagePath $(ls *.vsix)
      env:
        OVSX_PAT: ${{ secrets.OVSX_PAT }}
